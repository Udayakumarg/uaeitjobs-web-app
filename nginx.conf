server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Social-crawler bot detection ──────────────────────────────────────────
    # When a social platform (LinkedIn, Twitter/X, WhatsApp, Slack, Facebook,
    # Telegram) or a search-engine crawler fetches /jobs/{id}, redirect it to
    # the backend's SEO meta endpoint which returns a fully-rendered HTML page
    # with the correct Open Graph / Twitter Card / JSON-LD tags for that job.
    #
    # Real browser traffic falls through to try_files → index.html as normal.
    # ─────────────────────────────────────────────────────────────────────────
    location ~* ^/jobs/(\d+)$ {
        # Build a flag: 1 = bot, 0 = real browser
        set $social_bot 0;
        if ($http_user_agent ~* "(Twitterbot|LinkedInBot|facebookexternalhit|Slackbot|WhatsApp|TelegramBot|Googlebot|bingbot|DuckDuckBot|YandexBot|Baiduspider|Applebot)") {
            set $social_bot 1;
        }
        if ($social_bot = 1) {
            # 302 so the backend can serve fresh content without the CDN
            # caching a stale snapshot if we update job details.
            return 302 https://www.uaeitjobs.com/api/v1/seo/job/$1;
        }
        try_files $uri /index.html;
    }

    # ── Static routes ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
